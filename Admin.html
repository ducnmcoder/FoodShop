<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Manage Foods</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
    <style>
        :root {
            --main-color: #28a745;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }

        .navbar-brand {
            font-weight: bold;
            color: var(--main-color) !important;
            font-size: 1.6rem;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="Homepage.html">
                <img src="image/LogoPage.png" alt="FoodShop Logo" height="40">
                <span class="text-success ms-2 fw-bold fs-4">FoodShop</span>
                <span class="text-secondary ms-2 fs-5">| Admin Panel</span>
            </a>
            
            <div class="collapse navbar-collapse ms-4">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active fw-bold text-success" href="#" id="navFoods" onclick="showSection('foods')">Manage Foods</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="navOrders" onclick="showSection('orders')">Order History</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="Owner.html">Manage Users</a>
                    </li>
                </ul>
            </div>

            <div class="ms-auto d-flex align-items-center">
                <span id="adminGreeting" class="me-3 fw-bold text-success"></span>
                <button class="btn btn-outline-danger btn-sm me-2" onclick="adminLogout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container" id="foodsSection">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Manage Foods</h2>
            <button class="btn btn-success" onclick="openAddModal()">
                <i class="bi bi-plus-circle"></i> Add New Food
            </button>
        </div>

        <div class="table-responsive bg-white p-3 rounded shadow-sm">
            <table class="table table-hover align-middle">
                <thead class="table-success">
                    <tr>
                        <th>ID</th>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="foodTableBody">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Order History Section -->
    <div class="container" id="ordersSection" style="display: none;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Order History</h2>
            <button class="btn btn-outline-success" onclick="loadOrders()">
                <i class="bi bi-arrow-clockwise"></i> Refresh
            </button>
        </div>

        <div class="table-responsive bg-white p-3 rounded shadow-sm">
            <table class="table table-hover align-middle">
                <thead class="table-success">
                    <tr>
                        <th>Order ID</th>
                        <th>User ID</th>
                        <th>Customer</th>
                        <th>Phone</th>
                        <th>Total Amount</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="orderTableBody">
                    <!-- Data will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal for Add/Edit -->
    <div class="modal fade" id="foodModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title" id="foodModalTitle">Add/Edit Food</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="foodForm">
                        <input type="hidden" id="foodId">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" id="foodName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <select id="foodCategory" class="form-select" required>
                                <option value="vegetables">Vegetables</option>
                                <option value="meat">Meat & Seafood</option>
                                <option value="drinks">Drinks</option>
                                <option value="snacks">Snacks</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Price ($)</label>
                            <input type="number" step="0.01" id="foodPrice" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Image URL</label>
                            <input type="text" id="foodImage" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea id="foodDesc" class="form-control" rows="3" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-success w-100" id="saveBtn">Save</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Verify Access
        const adminUserJson = sessionStorage.getItem("user");
        let currentUserRole = '';
        if (!adminUserJson) {
            window.location.href = "Homepage.html";
        } else {
            const adminUser = JSON.parse(adminUserJson);
            currentUserRole = adminUser.role;
            if (currentUserRole !== 'ADMIN' && currentUserRole !== 'OWNER') {
                window.location.href = "Homepage.html";
            } else {
                const greetingEl = document.getElementById("adminGreeting");
                if (greetingEl) {
                    greetingEl.textContent = "Welcome, " + adminUser.username;
                }
                
                if (currentUserRole === 'OWNER') {
                    document.querySelector('.text-secondary.ms-2.fs-5').textContent = '| Owner Panel';
                } else {
                    document.querySelector('.text-secondary.ms-2.fs-5').textContent = '| Admin Panel';
                }
            }
        }

        // Logout
        window.adminLogout = function () {
            sessionStorage.removeItem("user");
            window.location.href = "Homepage.html";
        };

        const apiUrl = 'http://localhost:8080/api/foods';
        const foodModal = new bootstrap.Modal(document.getElementById('foodModal'));
        const foodForm = document.getElementById('foodForm');

        // Load Foods
        async function loadFoods() {
            try {
                const res = await fetch(apiUrl);
                const foods = await res.json();
                const tbody = document.getElementById('foodTableBody');
                tbody.innerHTML = '';

                foods.forEach(food => {
                    tbody.innerHTML += `
                    <tr>
                        <td>${food.id}</td>
                        <td><img src="${food.imageUrl}" alt="${food.name}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px;"></td>
                        <td class="fw-bold">${food.name}</td>
                        <td><span class="badge bg-secondary">${food.category}</span></td>
                        <td class="text-success fw-bold">$${food.price}</td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-primary me-2" onclick='openEditModal(${JSON.stringify(food).replace(/'/g, "&#39;")})'>
                                <i class="bi bi-pencil"></i> Edit
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteFood(${food.id})">
                                <i class="bi bi-trash"></i> Delete
                            </button>
                        </td>
                    </tr>
                `;
                });
            } catch (error) {
                console.error('Error loading foods:', error);
                alert('Failed to connect to backend API.');
            }
        }

        // Open Add Modal
        function openAddModal() {
            document.getElementById('foodModalTitle').innerText = 'Add New Food';
            foodForm.reset();
            document.getElementById('foodId').value = '';
            foodModal.show();
        }

        // Open Edit Modal
        function openEditModal(food) {
            document.getElementById('foodModalTitle').innerText = 'Edit Food';
            document.getElementById('foodId').value = food.id;
            document.getElementById('foodName').value = food.name;
            document.getElementById('foodCategory').value = food.category;
            document.getElementById('foodPrice').value = food.price;
            document.getElementById('foodImage').value = food.imageUrl;
            document.getElementById('foodDesc').value = food.description;
            foodModal.show();
        }

        // Save (Add/Update) Food
        foodForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('foodId').value;

            const foodData = {
                name: document.getElementById('foodName').value,
                category: document.getElementById('foodCategory').value,
                price: parseFloat(document.getElementById('foodPrice').value),
                imageUrl: document.getElementById('foodImage').value,
                description: document.getElementById('foodDesc').value
            };

            try {
                const method = id ? 'PUT' : 'POST';
                const url = id ? `${apiUrl}/${id}` : apiUrl;

                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(foodData)
                });

                if (res.ok) {
                    foodModal.hide();
                    loadFoods();
                } else {
                    alert('Failed to save food.');
                }
            } catch (error) {
                console.error('Error saving food:', error);
            }
        });

        // Delete Food
        async function deleteFood(id) {
            if (confirm('Are you sure you want to delete this food item?')) {
                try {
                    const res = await fetch(`${apiUrl}/${id}`, { method: 'DELETE' });
                    if (res.ok) {
                        loadFoods();
                    } else {
                        alert('Failed to delete food.');
                    }
                } catch (error) {
                    console.error('Error deleting food:', error);
                }
            }
        }

        // Show Section Logic
        function showSection(section) {
            document.getElementById('foodsSection').style.display = section === 'foods' ? 'block' : 'none';
            document.getElementById('ordersSection').style.display = section === 'orders' ? 'block' : 'none';
            
            document.getElementById('navFoods').classList.toggle('active', section === 'foods');
            document.getElementById('navFoods').classList.toggle('fw-bold', section === 'foods');
            document.getElementById('navFoods').classList.toggle('text-success', section === 'foods');
            
            document.getElementById('navOrders').classList.toggle('active', section === 'orders');
            document.getElementById('navOrders').classList.toggle('fw-bold', section === 'orders');
            document.getElementById('navOrders').classList.toggle('text-success', section === 'orders');
            
            if (section === 'orders') {
                loadOrders();
            }
        }

        // Load Orders
        async function loadOrders() {
            try {
                const res = await fetch('http://localhost:8080/api/orders/all');
                const orders = await res.json();
                const tbody = document.getElementById('orderTableBody');
                tbody.innerHTML = '';

                orders.forEach(order => {
                    const date = new Date(order.orderDate).toLocaleString();
                    const statusBadge = order.status === "PENDING" ? `<span class="badge bg-warning text-dark">${order.status}</span>` 
                        : (order.status === "APPROVED" ? `<span class="badge bg-success">${order.status}</span>` : `<span class="badge bg-danger">${order.status}</span>`);
                    
                    let actions = "";
                    if (order.status === "PENDING") {
                        actions = `
                            <button class="btn btn-sm btn-outline-success me-1" onclick="updateOrderStatus(${order.id}, 'APPROVED')">Approve</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="updateOrderStatus(${order.id}, 'REJECTED')">Reject</button>
                        `;
                    }
                    
                    tbody.innerHTML += `
                    <tr>
                        <td>#${order.id}</td>
                        <td>${order.user ? order.user.id : 'Guest'}</td>
                        <td class="fw-bold">${order.customerName}</td>
                        <td>${order.customerPhone}</td>
                        <td class="text-success fw-bold">$${order.totalAmount}</td>
                        <td>${date}</td>
                        <td>${statusBadge}</td>
                        <td class="text-center">${actions}</td>
                    </tr>
                `;
                });
            } catch (error) {
                console.error('Error loading orders:', error);
                alert('Failed to load orders.');
            }
        }

        // Update Order Status
        async function updateOrderStatus(id, status) {
            if (confirm(`Are you sure you want to ${status.toLowerCase()} this order?`)) {
                try {
                    const res = await fetch(`http://localhost:8080/api/orders/${id}/status`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: status })
                    });
                    if (res.ok) {
                        loadOrders();
                    } else {
                        alert('Failed to update order status.');
                    }
                } catch (error) {
                    console.error('Error updating order status:', error);
                }
            }
        }

        // Initialize
        loadFoods();
    </script>
</body>

</html>
