<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manager Panel - Manage Users</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <style>
      :root {
        --main-color: #28a745;
      }

      body {
        font-family: Arial, sans-serif;
        background-color: #f8f9fa;
      }

      .navbar-brand {
        font-weight: bold;
        color: var(--main-color) !important;
        font-size: 1.6rem;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg bg-white sticky-top shadow-sm mb-4">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="Homepage.html">
          <img src="image/LogoPage.png" alt="FoodShop Logo" height="40" />
          <span class="text-success ms-2 fw-bold fs-4">FoodShop</span>
          <span class="text-secondary ms-2 fs-5">| Owner Panel</span>
        </a>

        <div class="collapse navbar-collapse ms-4">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="Admin.html">Manage Foods</a>
            </li>
            <li class="nav-item">
              <a
                class="nav-link"
                href="Admin.html"
                onclick="sessionStorage.setItem('openTab', 'orders')"
                >Order History</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link active fw-bold text-success" href="Owner.html"
                >Manage Users</a
              >
            </li>
          </ul>
        </div>

        <div class="ms-auto d-flex align-items-center">
          <span id="ownerGreeting" class="me-3 fw-bold text-success"></span>
          <button
            class="btn btn-outline-danger btn-sm me-2"
            onclick="ownerLogout()"
          >
            Logout
          </button>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Manage Users</h2>
      </div>

      <div class="table-responsive bg-white p-3 rounded shadow-sm">
        <table class="table table-hover align-middle">
          <thead class="table-success">
            <tr>
              <th>ID</th>
              <th>Username</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th class="text-center">Actions</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <!-- Data will be loaded here -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Order History Modal -->
    <div class="modal fade" id="orderHistoryModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header bg-success text-white">
            <h5 class="modal-title">Order History</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div
            class="modal-body"
            style="
              max-height: 60vh;
              overflow-y: auto;
              background-color: #f8f9fa;
            "
          >
            <div id="orderHistoryContent">Loading...</div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Verify Access
      const ownerUserJson = sessionStorage.getItem("user");
      let currentUserId = null;
      if (!ownerUserJson) {
        window.location.href = "Homepage.html";
      } else {
        const ownerUser = JSON.parse(ownerUserJson);
        if (ownerUser.role !== "ADMIN" && ownerUser.role !== "OWNER") {
          window.location.href = "Homepage.html";
        } else {
          currentUserId = ownerUser.id;
          const greetingEl = document.getElementById("ownerGreeting");
          if (greetingEl) {
            greetingEl.textContent = "Welcome, " + ownerUser.username;
          }

          if (ownerUser.role === "ADMIN") {
            document.querySelector(".text-secondary.ms-2.fs-5").textContent =
              "| Admin Panel";
          } else {
            document.querySelector(".text-secondary.ms-2.fs-5").textContent =
              "| Owner Panel";
          }
        }
      }

      // Owner Logout
      window.ownerLogout = function () {
        sessionStorage.removeItem("user");
        window.location.href = "Homepage.html";
      };

      const apiUsersUrl = "http://localhost:8080/api/users";

      // Load Users
      async function loadUsers() {
        try {
          const res = await fetch(apiUsersUrl);
          const users = await res.json();
          const tbody = document.getElementById("userTableBody");
          tbody.innerHTML = "";

          users.forEach((user) => {
            const isLocked = user.locked;
            const statusBadge = isLocked
              ? '<span class="badge bg-danger">Locked</span>'
              : '<span class="badge bg-success">Active</span>';

            let actionButtons = "";
            const isLoggedAdmin =
              ownerUserJson && JSON.parse(ownerUserJson).role === "ADMIN";

            if (!isLoggedAdmin) {
              if (user.id !== currentUserId) {
                if (isLocked) {
                  actionButtons = `
                                    <button class="btn btn-sm btn-outline-success" onclick="unlockUser(${user.id})">
                                        <i class="bi bi-unlock"></i> Unlock
                                    </button>
                                `;
                } else {
                  actionButtons = `
                                    <button class="btn btn-sm btn-outline-danger" onclick="lockUser(${user.id})">
                                        <i class="bi bi-lock"></i> Lock
                                    </button>
                                `;
                }

                actionButtons += `
                                    <button class="btn btn-sm btn-outline-info ms-1" onclick="viewOrderHistory(${user.id}, '${user.username}')">
                                        <i class="bi bi-receipt"></i> Orders
                                    </button>
                                `;
              }
            }

            tbody.innerHTML += `
                    <tr>
                        <td>${user.id}</td>
                        <td class="fw-bold">${user.username}</td>
                        <td>${user.email}</td>
                        <td>${user.role}</td>
                        <td>${statusBadge}</td>
                        <td class="text-center">
                            ${actionButtons}
                        </td>
                    </tr>
                `;
          });
        } catch (error) {
          console.error("Error loading users:", error);
          alert("Failed to connect to backend API.");
        }
      }

      async function lockUser(id) {
        if (confirm("Are you sure you want to lock this user?")) {
          try {
            const res = await fetch(`${apiUsersUrl}/${id}/lock`, {
              method: "PUT",
            });
            if (res.ok) {
              loadUsers();
            } else {
              alert("Failed to lock user.");
            }
          } catch (error) {
            console.error("Error locking user:", error);
          }
        }
      }

      async function unlockUser(id) {
        if (confirm("Are you sure you want to unlock this user?")) {
          try {
            const res = await fetch(`${apiUsersUrl}/${id}/unlock`, {
              method: "PUT",
            });
            if (res.ok) {
              loadUsers();
            } else {
              alert("Failed to unlock user.");
            }
          } catch (error) {
            console.error("Error unlocking user:", error);
          }
        }
      }

      const orderHistoryModalObj = new bootstrap.Modal(
        document.getElementById("orderHistoryModal"),
      );

      async function viewOrderHistory(userId, username) {
        document.querySelector("#orderHistoryModal .modal-title").textContent =
          "Order History - " + username;
        const content = document.getElementById("orderHistoryContent");
        content.innerHTML = '<p class="text-center my-4">Loading orders...</p>';
        orderHistoryModalObj.show();

        try {
          const res = await fetch(
            "http://localhost:8080/api/orders/user/" + userId,
          );
          if (res.ok) {
            const orders = await res.json();
            if (orders.length === 0) {
              content.innerHTML =
                '<p class="text-center text-muted my-4">No orders found for this user.</p>';
              return;
            }

            let html = "";
            orders.forEach((o) => {
              let itemsHtml = "";
              if (o.items && o.items.length > 0) {
                o.items.forEach((i) => {
                  itemsHtml += `<li>${i.quantity}x ${i.foodName} ($${i.price})</li>`;
                });
              }

              html += `
                        <div class="card mb-3 shadow-sm border-0">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <h6 class="mb-0 fw-bold">Order #${o.id}</h6>
                                    <span class="badge ${o.status === "PENDING" ? "bg-warning" : "bg-success"}">${o.status}</span>
                                </div>
                                <p class="mb-1 text-muted small"><i class="bi bi-clock"></i> ${new Date(o.orderDate).toLocaleString()}</p>
                                <p class="mb-1 small"><strong>Name:</strong> ${o.customerName} | <strong>Phone:</strong> ${o.customerPhone}</p>
                                <p class="mb-1 small"><strong>Address:</strong> ${o.deliveryAddress}</p>
                                <p class="mb-2 small"><strong>Payment:</strong> ${o.paymentMethod}</p>
                                <hr class="my-2">
                                <ul class="small mb-2 ps-3 text-secondary">
                                    ${itemsHtml}
                                </ul>
                                <div class="text-end fw-bold text-success mt-2">
                                    Total: $${o.totalAmount.toFixed(2)}
                                </div>
                            </div>
                        </div>
                        `;
            });
            content.innerHTML = html;
          } else {
            content.innerHTML =
              '<p class="text-center text-danger my-4">Failed to load orders.</p>';
          }
        } catch (error) {
          console.error(error);
          content.innerHTML =
            '<p class="text-center text-danger my-4">Error connecting to server.</p>';
        }
      }

      // Initialize
      loadUsers();
    </script>
  </body>
</html>
