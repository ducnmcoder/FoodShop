# 1. Chuỗi kết nối đến SQL Server (Thay 'foodshop' bằng tên Database thật của bạn)
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=foodshop;encrypt=true;trustServerCertificate=true;

# 2. Tài khoản & Mật khẩu đăng nhập SQL Server của bạn
spring.datasource.username=sa
spring.datasource.password=123

# 3. Khai báo Driver SQL Server (Dòng này sẽ thay thế cho com.mysql.cj.jdbc.Driver)
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# 4. Cấu hình Hibernate cho SQL Server
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true